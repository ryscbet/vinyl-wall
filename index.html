<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy 8-Bit Vinyl Room Builder v2</title>
  <style>
    :root {
      --bg-color: #1f1315;
      --wall-color: #5c3a21; 
      --shelf-color: #3d2314;
      --sidebar-color: #2b1810;
      --text-color: #f7ebe1;
      --pixel-border: 4px solid #26140a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
    }

    body {
      display: flex;
      height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-color);
      overflow: hidden;
    }

    /* Sidebar Panels */
    .sidebar {
      width: 380px;
      background-color: var(--sidebar-color);
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      border-right: 6px solid #26140a;
      z-index: 10;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 1.4rem;
      text-align: center;
      color: #dfb18b;
      text-transform: uppercase;
      border-bottom: 4px dashed #26140a;
      padding-bottom: 8px;
    }

    .section-title {
      font-size: 0.9rem;
      color: #dfb18b;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    /* Input & Buttons */
    .search-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .search-input {
      background: #26140a;
      border: 3px solid #dfb18b;
      padding: 10px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    .btn {
      background-color: #c75a41;
      color: white;
      border: 3px solid #26140a;
      padding: 10px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 4px 0 #7a3121;
    }
    .btn:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    /* Customizer Grid */
    .customizer-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .custom-item-btn {
      background: #42281d;
      border: 3px solid #26140a;
      color: var(--text-color);
      padding: 10px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .custom-item-btn:hover { background: #573729; }

    /* Vinyl Previews */
    .palette {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-height: 150px;
      overflow-y: auto;
      background: #1f110a;
      padding: 8px;
      border: 3px solid #26140a;
    }
    .palette-item {
      background: #361f15;
      border: 2px solid #26140a;
      padding: 5px;
      cursor: pointer;
      text-align: center;
    }
    .palette-item p {
      font-size: 0.65rem;
      margin-top: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Room Canvas Frame */
    .room-container {
      flex: 1;
      padding: 25px;
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wall {
      width: 100%;
      height: 100%;
      max-width: 760px;   
      max-height: 570px;  
      aspect-ratio: 4 / 3;
      background-color: var(--wall-color);
      background-image: 
        linear-gradient(90deg, rgba(38,20,10,0.15) 2px, transparent 2px),
        linear-gradient(rgba(38,20,10,0.15) 2px, transparent 2px);
      background-size: 40px 40px;
      border: 8px solid #26140a;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
      transition: background-color 0.4s;
    }

    /* Aesthetic Warm Golden Light Glow Radial Blend Overlay */
    .light-glow-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at var(--lamp-x, 40%) var(--lamp-y, 70%), rgba(255, 158, 44, 0.35) 0%, rgba(92, 58, 33, 0) 75%);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .wall.lamp-on .light-glow-overlay {
      opacity: 1;
    }

    /* Ambient Hanging Plants at Top */
    .wall-plants {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 35px;
      background: repeating-linear-gradient(90deg, transparent, transparent 40px, #3a5a40 40px, #3a5a40 60px, #4f772d 60px, #4f772d 80px);
      opacity: 0.7;
      border-bottom: 4px dashed #26140a;
    }

    /* 3-Row Shelf System */
    .shelf {
      position: absolute;
      left: 3%; width: 94%; height: 20px;
      background: var(--shelf-color);
      border: 4px solid #1a0d06;
      box-shadow: 0 8px 0 #1a0d06, 0 12px 10px rgba(0,0,0,0.5), inset 0 4px 0 #5c3a21;
      z-index: 2;
    }
    .shelf-1 { top: 26%; }
    .shelf-2 { top: 56%; }
    .shelf-3 { top: 86%; }

    /* Retro Vinyl Holder Rack Slots */
    .rack-slot {
      position: absolute;
      width: 135px; height: 25px;
      background: #211107;
      border: 4px solid #140904;
      border-top: none;
      z-index: 1;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.4);
    }

    /* Large Vinyl Records Design */
    .vinyl {
      width: 135px; height: 135px;
      border-radius: 50%;
      background: radial-gradient(circle, #111 20%, #222 35%, #111 40%, #1a1a1a 50%, #050505 70%);
      box-shadow: inset 0 0 0 4px #000, 0 8px 14px rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    
    .vinyl::before {
      content: '';
      width: 90px; height: 90px;
      border-radius: 50%;
      background-image: var(--cover-art, none);
      background-size: cover;
      background-position: center;
      border: 3px solid #000;
      z-index: 4;
      image-rendering: pixelated;
    }
    
    .vinyl::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background-color: var(--wall-color);
      position: absolute;
      z-index: 5;
    }

    /* Pixel Pop Animation for Unlocking */
    @keyframes pixelPop {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.12); filter: brightness(1.4); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .pixel-popping {
      animation: pixelPop 0.2s ease-out;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    .spinning {
      animation: spin 2.5s linear infinite;
    }

    /* Movable Objects Wrapper */
    .movable-asset {
      position: absolute;
      cursor: grab;
      touch-action: none;
      user-select: none;
      z-index: 5;
    }
    .movable-asset:active {
      cursor: grabbing;
    }

    /* Interactive 8-Bit Speech Input Bubble */
    .pet-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .speech-bubble {
      background: #fff;
      border: 3px solid #000;
      border-radius: 4px;
      padding: 3px 6px;
      position: relative;
      margin-bottom: 8px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -9px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px;
      background: #fff;
      border-right: 3px solid #000;
      border-bottom: 3px solid #000;
    }

    .speech-bubble input {
      border: none; outline: none;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem; width: 65px;
      text-align: center; font-weight: bold;
      color: #000;
    }

    /* Functional Record Player Design */
    .turntable-frame {
      width: 190px; height: 145px;
      background: #b5835a;
      border: 5px solid #26140a;
      box-shadow: 0 8px 0 #26140a, inset 0 5px 0 #dfb18b;
      border-radius: 8px; padding: 12px;
      display: flex; align-items: center; justify-content: flex-start;
    }
    .turntable-platter {
      width: 115px; height: 115px;
      background: #333;
      border-radius: 50%;
      border: 4px solid #26140a;
    }
    .needle-arm {
      width: 10px; height: 65px;
      background: #ccd5ae;
      border: 3px solid #26140a;
      position: absolute; right: 25px; top: 20px;
      transform-origin: top center;
      transform: rotate(15deg);
      transition: transform 0.3s;
      z-index: 6;
    }
    .playing .needle-arm {
      transform: rotate(33deg);
    }

    /* Arched Floor Lamp Layout */
    .lamp-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .lamp-beam {
      width: 120px; height: 180px;
      background: linear-gradient(rgba(255,200,80,0.45), transparent);
      clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
      position: absolute; left: -55px; top: 30px;
      display: none; pointer-events: none;
    }
    .lamp-wrapper.on .lamp-beam {
      display: block;
    }

    .pixel-art-asset svg {
      shape-rendering: crispEdges; 
    }

    #status-msg {
      font-size: 0.75rem;
      color: #dfb18b;
      text-align: center;
      min-height: 14px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Cozy Room Builder</h2>
    
    <!-- 1. Music Search Engine -->
    <div class="search-container">
      <div class="section-title">Search Songs / Vinyls:</div>
      <input type="text" id="search-input" class="search-input" placeholder="Artist or song name...">
      <button id="search-btn" class="btn">Find Tracks</button>
      <div id="status-msg"></div>
    </div>
    
    <div class="palette" id="palette"></div>

    <!-- 2. Room Customizer Grid -->
    <div>
      <div class="section-title">Add Large Furniture:</div>
      <div class="customizer-grid">
        <button class="custom-item-btn" onclick="spawnPixelAsset('coffee')">☕ Big Coffee Maker</button>
        <button class="custom-item-btn" onclick="spawnMug('#2b2d42', 'Black')">🖤 Black Mug</button>
        <button class="custom-item-btn" onclick="spawnMug('#e63946', 'Red')">❤️ Red Mug</button>
        <button class="custom-item-btn" onclick="spawnLamp()">💡 Arched Floor Lamp</button>
        <button class="custom-item-btn" onclick="spawnPixelAsset('floorPlant')">🌿 Floor Plant</button>
        <button class="custom-item-btn" onclick="spawnPixelAsset('hangingPlant')">🪴 Hanging Plant</button>
        <button class="custom-item-btn" onclick="spawnPet('cat')">🐈 Cute Pixel Cat</button>
        <button class="custom-item-btn" onclick="spawnPet('dog')">🐕 Minecraft Dog</button>
        <button class="custom-item-btn" onclick="spawnTurntable()">🎛️ Vinyl Player</button>
      </div>
    </div>

    <button class="btn" id="clear-wall" style="background-color: #5c3a21; margin-top: auto;">Clear Room</button>
  </div>

  <div class="room-container">
    <div class="wall" id="wall">
      <div class="light-glow-overlay"></div>
      <div class="wall-plants"></div>

      <!-- The 3 Rows of Shelves -->
      <div class="shelf shelf-1"></div>
      <div class="shelf shelf-2"></div>
      <div class="shelf shelf-3"></div>
    </div>
  </div>

  <audio id="audio-engine" loop></audio>

  <script>
    const palette = document.getElementById('palette');
    const wall = document.getElementById('wall');
    const clearBtn = document.getElementById('clear-wall');
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const statusMsg = document.getElementById('status-msg');
    const audioEngine = document.getElementById('audio-engine');

    let currentPlayingVinyl = null;
    const racks = []; 

    const pixelArtLibrary = {
      cat_stand: `<svg width="115" height="85" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 5h8v6H1V5z" fill="#d4a373"/><path d="M9 3h6v6H9V3z" fill="#e7c19b"/><path d="M9 1h2v2H9V1zm4 0h2v2h-2V1z" fill="#d4a373"/><path d="M10 4h2v2h-2V4zm3 0h2v2h-2V4z" fill="#fff"/><path d="M10 5h1v1h-1V5zm3 0h1v1h-1V5z" fill="#26140a"/><path d="M12 6h1v1h-1V6z" fill="#ffb4a2"/><path d="M3 11h2v5H3v-5zm4 1h2v4H7v-4zm6-1h2v5h-2v-5z" fill="#26140a"/><path d="M0 3h2v5H0V3z" fill="#d4a373"/></svg>`,
      cat_sit: `<svg width="115" height="85" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6h6v8H4V6z" fill="#e7c19b"/><path d="M6 2h6v6H6V2z" fill="#d4a373"/><path d="M6 0h2v2H6V0zm4 0h2v2h-2V0z" fill="#d4a373"/><path d="M7 3h2v2H7V3zm3 0h2v2h-2V3z" fill="#fff"/><path d="M7 4h1v1H7V4zm3 0h1v1h-1V4z" fill="#26140a"/><path d="M9 5h1v1H9V5z" fill="#ffb4a2"/><path d="M4 14h3v2H4v-2zm4 0h3v2H8v-2z" fill="#26140a"/></svg>`,
      dog_stand: `<svg width="120" height="90" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 5h10v6H2V5z" fill="#b07d62"/><path d="M12 3h6v6h-6V3z" fill="#9c6644"/><path d="M18 5h3v3h-3V5z" fill="#7f5539"/><path d="M19 4h2v1h-2V4z" fill="#000"/><path d="M13 4h2v2h-2V4zm3 0h2v2h-2V4z" fill="#fff"/><path d="M14 4h1v1h-1V4zm3 0h1v1h-1V4z" fill="#000"/><path d="M4 11h2v5H4v-5zm6 0h2v5h-2v-5zm6-2h2v7h-2V9z" fill="#26140a"/></svg>`,
      dog_sit: `<svg width="120" height="90" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 6h7v8H5V6z" fill="#b07d62"/><path d="M8 2h6v6H8V2z" fill="#9c6644"/><path d="M14 4h3v3h-3V4z" fill="#7f5539"/><path d="M15 3h2v1h-2V3z" fill="#000"/><path d="M9 3h2v2H9V3zm3 0h2v2h-2V3z" fill="#fff"/><path d="M10 3h1v1h-1V3zm3 0h1v1h-1V3z" fill="#000"/><path d="M5 14h3v2H5v-2zm5 0h3v2h-3v-2z" fill="#26140a"/></svg>`,
      coffee: `<svg class="coffee-machine-target" width="105" height="135" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 0h12v16H1V0z" fill="#3a3d40"/><path d="M2 1h10v6H2V1z" fill="#7a8085"/><path d="M3 2h2v1H3V2zm4 0h4v3H7V2z" fill="#1d3557"/><path d="M2 9h9v6H2V9z" fill="#fff"/><path d="M3 13h7v2H3v-2z" fill="#222"/><path d="M13 3h2v7h-2V3z" fill="#1a1c1e"/></svg>`,
      floorPlant: `<svg width="90" height="120" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 1h6v4H5V1zm-4 4h14v3H1V5zm3 3h10v2H4V8z" fill="#38b000"/><path d="M3 8h10v7H3V8z" fill="#b76935"/><path d="M4 9h8v5H4V9z" fill="#a0522d"/></svg>`,
      hangingPlant: `<svg width="85" height="120" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 0h2v5H7V0z" fill="#ccd5ae"/><path d="M2 5h12v4H2V5z" fill="#bc6c25"/><path d="M1 9h3v6H1V9zm11 0h3v5h-3V9zm-6 0h4v7H6V9z" fill="#2d6a4f"/></svg>`
    };

    window.onload = () => { 
      buildVisibleRacks();
      fetchTracks("8-Bit Lofi"); 
    };

    function buildVisibleRacks() {
      racks.length = 0;
      for (let i = 0; i < 9; i++) {
        const shelfIndex = Math.floor(i / 3) + 1;
        const slotIndex = i % 3;
        const targetShelf = document.querySelector(`.shelf-${shelfIndex}`);
        
        const horizontalSpacing = wall.clientWidth / 3;
        const startX = (horizontalSpacing * slotIndex) + (horizontalSpacing / 2) - 67;
        const startY = targetShelf.offsetTop - 18; 

        const rackEl = document.createElement('div');
        rackEl.classList.add('rack-slot');
        rackEl.style.left = `${startX}px`;
        rackEl.style.top = `${startY}px`;
        wall.appendChild(rackEl);

        racks.push({
          id: i,
          el: rackEl,
          left: startX,
          top: targetShelf.offsetTop - 128, 
          occupiedBy: null
        });
      }
    }

    searchBtn.addEventListener('click', () => { if(searchInput.value.trim()) fetchTracks(searchInput.value); });
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && searchInput.value.trim()) fetchTracks(searchInput.value); });

    async function fetchTracks(query) {
      statusMsg.textContent = "Scanning catalog...";
      palette.innerHTML = "";
      try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=8`);
        const data = await res.json();
        if(data.results.length === 0) { statusMsg.textContent = "No music tracks found."; return; }
        statusMsg.textContent = "";
        displayResults(data.results);
      } catch (err) {
        statusMsg.textContent = "Network error loading library.";
      }
    }

    function displayResults(songs) {
      songs.forEach(song => {
        const highResCover = song.artworkUrl100.replace("100x100bb.jpg", "400x400bb.jpg");
        const item = document.createElement('div');
        item.classList.add('palette-item');
        
        const previewVinyl = document.createElement('div');
        previewVinyl.classList.add('vinyl');
        previewVinyl.style.setProperty('--cover-art', `url('${highResCover}')`);
        previewVinyl.style.transform = 'scale(0.38)'; 
        
        const title = document.createElement('p');
        title.textContent = song.trackName;

        item.appendChild(previewVinyl);
        item.appendChild(title);
        
        item.addEventListener('click', () => spawnVinyl(highResCover, song.previewUrl));
        palette.appendChild(item);
      });
    }

    function lockVinylToRack(vinylEl, rack) {
      vinylEl.style.left = `${rack.left}px`;
      vinylEl.style.top = `${rack.top}px`;
      vinylEl.dataset.locked = "true";
      vinylEl.dataset.rackId = rack.id;
      rack.occupiedBy = vinylEl;
    }

    function unlockVinylFromRack(vinylEl) {
      const rackId = vinylEl.dataset.rackId;
      if (rackId !== undefined && racks[rackId]) {
        racks[rackId].occupiedBy = null;
      }
      vinylEl.dataset.locked = "false";
      delete vinylEl.dataset.rackId;

      // Pop Visuals
      vinylEl.classList.add('pixel-popping');
      vinylEl.addEventListener('animationend', () => {
        vinylEl.classList.remove('pixel-popping');
      }, { once: true });
    }

    function spawnVinyl(coverUrl, previewUrl) {
      const freeRack = racks.find(r => r.occupiedBy === null);
      if (!freeRack) {
        statusMsg.textContent = "⚠️ ALL HOLDER RACKS FULL! MAX 9 VINYLS.";
        statusMsg.style.color = "#ff4757";
        return;
      }

      const vinyl = document.createElement('div');
      vinyl.classList.add('movable-asset', 'vinyl', 'placed-vinyl');
      vinyl.style.setProperty('--cover-art', `url('${coverUrl}')`);
      vinyl.dataset.preview = previewUrl;
      
      lockVinylToRack(vinyl, freeRack);

      vinyl.addEventListener('dblclick', () => {
        if (currentPlayingVinyl === vinyl) stopMusic();
        if (vinyl.dataset.rackId !== undefined && racks[vinyl.dataset.rackId]) {
          racks[vinyl.dataset.rackId].occupiedBy = null;
        }
        vinyl.remove();
        statusMsg.textContent = ""; 
      });

      // Quick single-click backup manual unlock
      vinyl.addEventListener('click', () => {
        if (vinyl.dataset.locked === "true") unlockVinylFromRack(vinyl);
      });

      wall.appendChild(vinyl);
      makeDraggable(vinyl);
    }

    function spawnPet(type) {
      const container = document.createElement('div');
      container.classList.add('movable-asset', 'pet-container');
      
      const bubble = document.createElement('div');
      bubble.classList.add('speech-bubble');
      
      const input = document.createElement('input');
      input.type = "text";
      input.placeholder = "command";
      bubble.appendChild(input);

      const artWrapper = document.createElement('div');
      artWrapper.classList.add('pixel-art-asset');
      artWrapper.innerHTML = pixelArtLibrary[type + '_stand'];

      container.appendChild(bubble);
      container.appendChild(artWrapper);

      const shelf3 = document.querySelector('.shelf-3');
      container.style.left = `${Math.random() * (wall.clientWidth - 150) + 20}px`;
      container.style.top = `${shelf3.offsetTop - 110}px`;

      input.addEventListener('input', (e) => {
        const cleanedCmd = e.target.value.toLowerCase().trim();
        if (cleanedCmd === 'sit') {
          artWrapper.innerHTML = pixelArtLibrary[type + '_sit'];
        } else if (cleanedCmd === 'stand') {
          artWrapper.innerHTML = pixelArtLibrary[type + '_stand'];
        }
      });

      container.addEventListener('dblclick', (e) => {
        if(e.target.tagName !== 'INPUT') container.remove();
      });

      wall.appendChild(container);
      makeDraggable(container);
    }

    function buildMugSvg(hexColor, isFilled) {
      const liquidFill = isFilled ? "#582f0e" : "transparent";
      return `<svg width="55" height="55" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 4h9v9H2V4z" fill="${hexColor}"/>
                <path d="M11 6h3v5h-3V6zm1 h1v3h-1V7z" fill="${hexColor}"/>
                <path d="M3 5h7v3H3V5z" fill="${liquidFill}"/>
              </svg>`;
    }

    function spawnMug(hexColor, name) {
      const mug = document.createElement('div');
      mug.classList.add('movable-asset', 'pixel-art-asset', 'mug-asset');
      mug.dataset.color = hexColor;
      mug.dataset.filled = "false";
      mug.innerHTML = buildMugSvg(hexColor, false);

      const shelf3 = document.querySelector('.shelf-3');
      mug.style.left = `${Math.random() * (wall.clientWidth - 100) + 50}px`;
      mug.style.top = `${shelf3.offsetTop - 45}px`;

      mug.addEventListener('dblclick', () => mug.remove());
      wall.appendChild(mug);
      makeDraggable(mug);
    }

    function spawnLamp() {
      const wrapper = document.createElement('div');
      wrapper.classList.add('movable-asset', 'lamp-wrapper', 'pixel-art-asset');
      
      const archedLampSvg = `
        <svg width="120" height="210" viewBox="0 0 32 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 52h10v4H18v-4z" fill="#2d3142"/>
          <path d="M22 12h2v40h-2V12z" fill="#9a8c98"/>
          <path d="M10 6h14v2H10V6zM8 8h2v4H8V8zm14 8h2v4h-2v-4z" fill="#9a8c98"/>
          <path d="M4 12h6v6H4v-6z" fill="#e63946"/> 
          <path d="M5 18h4v1H5v-1z" fill="#ffd166"/>
        </svg>
      `;

      const beam = document.createElement('div');
      beam.classList.add('lamp-beam');

      wrapper.innerHTML = archedLampSvg;
      wrapper.appendChild(beam);

      const shelf3 = document.querySelector('.shelf-3');
      wrapper.style.left = "480px";
      wrapper.style.top = `${shelf3.offsetTop - 194}px`;

      wrapper.addEventListener('click', (e) => {
        if (wrapper.dataset.dragging === "true") return;
        wrapper.classList.toggle('on');
        
        const currentLampsOn = document.querySelectorAll('.lamp-wrapper.on');
        if (currentLampsOn.length > 0) {
          const leftCoords = parseInt(wrapper.style.left, 10) + 15; 
          const topCoords = parseInt(wrapper.style.top, 10) + 20;
          wall.style.setProperty('--lamp-x', `${(leftCoords / wall.clientWidth) * 100}%`);
          wall.style.setProperty('--lamp-y', `${(topCoords / wall.clientHeight) * 100}%`);
          wall.classList.add('lamp-on');
        } else {
          wall.classList.remove('lamp-on');
        }
      });

      wrapper.addEventListener('dblclick', () => {
        wrapper.remove();
        if (!document.querySelector('.lamp-wrapper.on')) wall.classList.remove('lamp-on');
      });

      wall.appendChild(wrapper);
      makeDraggable(wrapper);
    }

    function spawnPixelAsset(key) {
      const decor = document.createElement('div');
      decor.classList.add('movable-asset', 'pixel-art-asset');
      if (key === 'coffee') decor.classList.add('coffee-machine-instance');
      decor.innerHTML = pixelArtLibrary[key];

      const shelf3 = document.querySelector('.shelf-3');
      const targetShelf = (key === 'hangingPlant') ? document.querySelector('.shelf-1') : shelf3;
      
      decor.style.left = `${Math.random() * (wall.clientWidth - 120) + 20}px`;
      decor.style.top = `${targetShelf.offsetTop - (key === 'hangingPlant' ? 25 : (key === 'coffee' ? 120 : 85))}px`;

      decor.addEventListener('dblclick', () => decor.remove());
      wall.appendChild(decor);
      makeDraggable(decor);
    }

    function spawnTurntable() {
      if(document.querySelector('.turntable-frame')) return;

      const player = document.createElement('div');
      player.classList.add('movable-asset', 'turntable-frame');
      
      const platter = document.createElement('div');
      platter.classList.add('turntable-platter');
      
      const arm = document.createElement('div');
      arm.classList.add('needle-arm');

      player.appendChild(platter);
      player.appendChild(arm);

      const shelf3 = document.querySelector('.shelf-3');
      player.style.left = "40px";
      player.style.top = `${shelf3.offsetTop - 130}px`;

      player.addEventListener('dblclick', () => {
        stopMusic();
        player.remove();
      });

      wall.appendChild(player);
      makeDraggable(player);
    }

    // FIXED DRAG ENGINE: Bypasses locks seamlessly if user initiates drag behavior
    let activeElement = null;
    let startX, startY, initialLeft, initialTop;
    let dragMoveDetected = false;

    function makeDraggable(element) {
      element.addEventListener('pointerdown', (e) => {
        if (e.target.tagName === 'INPUT') return;

        activeElement = element;
        activeElement.dataset.dragging = "false";
        dragMoveDetected = false;

        document.querySelectorAll('.movable-asset').forEach(v => v.style.zIndex = 5);
        activeElement.style.zIndex = 10;

        // If picking up a vinyl playing music on turntable, shut it off instantly
        if (activeElement.classList.contains('placed-vinyl') && currentPlayingVinyl === activeElement) {
          stopMusic();
        }

        startX = e.clientX;
        startY = e.clientY;
        initialLeft = parseInt(activeElement.style.left, 10) || 0;
        initialTop = parseInt(activeElement.style.top, 10) || 0;

        activeElement.setPointerCapture(e.pointerId);
        e.stopPropagation();
      });

      element.addEventListener('pointermove', (e) => {
        if (activeElement !== element) return;

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
          dragMoveDetected = true;
          activeElement.dataset.dragging = "true";

          // CRITICAL FIX: Dragging a locked vinyl now automatically forces an unlock action!
          if (activeElement.classList.contains('placed-vinyl') && activeElement.dataset.locked === "true") {
            unlockVinylFromRack(activeElement);
          }
        }

        let newLeft = initialLeft + dx;
        let newTop = initialTop + dy;

        const maxLeft = wall.clientWidth - element.clientWidth;
        const maxTop = wall.clientHeight - element.clientHeight;

        newLeft = Math.max(0, Math.min(newLeft, maxLeft));
        newTop = Math.max(0, Math.min(newTop, maxTop));

        activeElement.style.left = `${newLeft}px`;
        activeElement.style.top = `${newTop}px`;
      });

      element.addEventListener('pointerup', (e) => {
        if (activeElement === element) {
          activeElement.releasePointerCapture(e.pointerId);
          
          setTimeout(() => { if(element) element.dataset.dragging = "false"; }, 50);

          if (activeElement.classList.contains('placed-vinyl')) {
            const snappedToPlayer = checkTurntableSnap(activeElement);
            if (!snappedToPlayer) {
              checkRackSlotSnap(activeElement);
            }
          }
          if (activeElement.classList.contains('mug-asset')) {
            checkCoffeeMachineFillProximity(activeElement);
          }
          
          activeElement = null;
        }
      });
    }

    function checkRackSlotSnap(vinylEl) {
      const vRect = vinylEl.getBoundingClientRect();
      
      for (let i = 0; i < racks.length; i++) {
        const rack = racks[i];
        if (rack.occupiedBy !== null) continue;
        
        const rRect = rack.el.getBoundingClientRect();
        const isOverlapping = !(vRect.right < rRect.left || vRect.left > rRect.right || vRect.bottom < rRect.top || vRect.top > rRect.bottom);
        
        if (isOverlapping) {
          lockVinylToRack(vinylEl, rack);
          return true;
        }
      }
      return false;
    }

    function checkCoffeeMachineFillProximity(mugEl) {
      const machineEl = document.querySelector('.coffee-machine-instance');
      if (!machineEl) return;

      const mRect = mugEl.getBoundingClientRect();
      const cRect = machineEl.getBoundingClientRect();

      const isOverlapping = !(mRect.right < (cRect.left - 15) || mRect.left > (cRect.right + 15) || mRect.bottom < (cRect.top - 15) || mRect.top > (cRect.bottom + 15));

      if (isOverlapping) {
        const wallRect = wall.getBoundingClientRect();
        const targetLeft = (cRect.left - wallRect.left) + (cRect.width / 2) - (mRect.width / 2) - 4;
        const targetTop = (cRect.top - wallRect.top) + cRect.height - mRect.height - 10;

        mugEl.style.left = `${targetLeft}px`;
        mugEl.style.top = `${targetTop}px`;

        mugEl.dataset.filled = "true";
        mugEl.innerHTML = buildMugSvg(mugEl.dataset.color, true);
        
        statusMsg.textContent = "☕ MUG FILLED WITH FRESH COFFEE!";
        statusMsg.style.color = "#dfb18b";
        setTimeout(() => { if(statusMsg.textContent.includes("FRESH")) statusMsg.textContent = ""; }, 3000);
      }
    }

    function checkTurntableSnap(vinylEl) {
      const playerEl = document.querySelector('.turntable-frame');
      if (!playerEl) return false;

      const vRect = vinylEl.getBoundingClientRect();
      const pRect = playerEl.getBoundingClientRect();

      // Expanded collision snapping area (+/- 15px extra forgiveness)
      const isOverlapping = !(vRect.right < (pRect.left - 15) || vRect.left > (pRect.right + 15) || vRect.bottom < (pRect.top - 15) || vRect.top > (pRect.bottom + 15));

      if (isOverlapping) {
        const platterEl = playerEl.querySelector('.turntable-platter');
        const platterRect = platterEl.getBoundingClientRect();
        const wallRect = wall.getBoundingClientRect();

        const snapLeft = (platterRect.left - wallRect.left) + (platterRect.width / 2) - (vRect.width / 2);
        const snapTop = (platterRect.top - wallRect.top) + (platterRect.height / 2) - (vRect.height / 2);

        vinylEl.style.left = `${snapLeft}px`;
        vinylEl.style.top = `${snapTop}px`;

        vinylEl.classList.add('spinning');
        playerEl.classList.add('playing');
        currentPlayingVinyl = vinylEl;

        if(vinylEl.dataset.preview) {
          audioEngine.src = vinylEl.dataset.preview;
          audioEngine.play().catch(e => {
            console.log("Autoplay unblock required.");
            statusMsg.textContent = "🔊 Click inside the wall once to let browser play audio!";
            statusMsg.style.color = "#dfb18b";
          });
        }
        return true;
      }
      return false;
    }

    function stopMusic() {
      audioEngine.pause();
      audioEngine.src = "";
      if (currentPlayingVinyl) currentPlayingVinyl.classList.remove('spinning');
      const playerEl = document.querySelector('.turntable-frame');
      if (playerEl) playerEl.classList.remove('playing');
      currentPlayingVinyl = null;
    }

    clearBtn.addEventListener('click', () => {
      stopMusic();
      document.querySelectorAll('.movable-asset').forEach(asset => asset.remove());
      racks.forEach(r => r.occupiedBy = null); 
      wall.classList.remove('lamp-on');
      statusMsg.textContent = "";
    });
  </script>
</body>
</html>
